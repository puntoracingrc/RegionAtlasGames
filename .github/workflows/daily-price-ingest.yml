name: Daily price ingest

on:
  schedule:
    # 04:00 UTC — una plataforma al día
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Slug plataforma (vacío = rotación automática)"
        required: false
        type: string
      dry_run:
        description: "Solo simular pasos"
        required: false
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily ingest
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          DAILY_SOURCE_PAUSE_SEC: "8"
          DAILY_EBAY_GAME_LIMIT: "25"
        run: |
          ARGS=()
          if [[ -n "${{ inputs.platform }}" ]]; then
            ARGS+=(--platform "${{ inputs.platform }}")
          fi
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          ./scripts/daily-price-ingest.sh "${ARGS[@]}"

      - name: Commit price updates
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/price-sync-state.json data/meta.json data/price-ingest/
          if git diff --staged --quiet; then
            echo "Sin cambios en precios."
            exit 0
          fi
          git commit -m "chore(prices): daily ingest $(date -u +%Y-%m-%d)"
          git push
